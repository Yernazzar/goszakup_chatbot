version: "3.9"

services:
  # PostgreSQL with pgvector extension
  db:
    image: pgvector/pgvector:pg16
    container_name: goszakup_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: goszakup_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-0000}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goszakup_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Agent Web Application
  app:
    build: .
    container_name: goszakup_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-goszakup_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-0000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOSZAKUP_API_TOKEN: ${GOSZAKUP_API_TOKEN}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-antigravity-secret-2026}
    ports:
      - "5000:5000"
    volumes:
      - ./:/app  # hot-reload for development; remove in production
    env_file:
      - .env

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: goszakup_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db
    profiles:
      - tools  # Only starts with: docker compose --profile tools up

volumes:
  pgdata:
    driver: local
